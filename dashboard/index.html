<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Monitor — SEO Intelligence Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Real-time dashboard for monitoring Google Search updates, competitor intelligence, SEO community discussions, and brand mentions.">
</head>
<body>
    <div class="background-globes">
        <div class="globe globe-purple"></div>
        <div class="globe globe-blue"></div>
        <div class="globe globe-orange"></div>
    </div>

    <main class="dashboard-container">
        <header class="dashboard-header">
            <div>
                <h1>Pulse <span>Monitor</span></h1>
                <p>Real-time Google Algorithm & Brand Sentiment Intelligence</p>
                <p class="last-updated" id="lastUpdated"></p>
            </div>
            <div class="stats-overview">
                <div class="stat-card" data-filter="all">
                    <span class="stat-label">Total Alerts</span>
                    <span class="stat-value" id="stat-total" data-target="0">0</span>
                </div>
                <div class="stat-card highlight" data-filter="Brand Mention">
                    <span class="stat-label">Brand Mentions</span>
                    <span class="stat-value" id="stat-mentions" data-target="0">0</span>
                </div>
                <div class="stat-card" data-filter="competitor">
                    <span class="stat-label">Competitor Intel</span>
                    <span class="stat-value" id="stat-competitors" data-target="0">0</span>
                </div>
            </div>
        </header>

        <!-- Search & Controls Bar -->
        <section class="controls-bar" id="controlsBar">
            <div class="search-wrapper" id="searchWrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input" placeholder="Search alerts, sources, competitors..." autocomplete="off">
                <span class="search-clear hidden" id="searchClear">✕</span>
                <span class="search-shortcut">ESC</span>
            </div>
            <div class="sort-controls">
                <button class="sort-btn active" data-sort="newest" title="Newest first">↓ Newest</button>
                <button class="sort-btn" data-sort="oldest" title="Oldest first">↑ Oldest</button>
            </div>
        </section>

        <section class="filters" aria-label="Alert Filters" id="filterBar">
            <button class="filter-btn active" data-filter="all">All Signals <span class="filter-count" id="count-all"></span></button>
            <button class="filter-btn" data-filter="Brand Mention">Brand Mentions <span class="filter-count" id="count-brand"></span></button>
            <button class="filter-btn" data-filter="algo_chatter">Algo Chatter <span class="filter-count" id="count-algo"></span></button>
            <button class="filter-btn" data-filter="competitor">Competitor Intel <span class="filter-count" id="count-comp"></span></button>
            <button class="filter-btn" data-filter="SERP Feature Change">SERP Features <span class="filter-count" id="count-serp"></span></button>
            <button class="filter-btn" data-filter="official">Official Updates <span class="filter-count" id="count-official"></span></button>
        </section>

        <!-- Monthly Summary Panel -->
        <section class="monthly-summary" id="monthlySummary">
            <div class="summary-header" id="summaryToggle">
                <div class="summary-title-row">
                    <h2 class="summary-title">📊 <span id="summaryMonthLabel">Monthly</span> Summary</h2>
                    <span class="summary-toggle-icon" id="toggleIcon">▼</span>
                </div>
                <p class="summary-subtitle" id="summarySubtitle">Loading summary...</p>
            </div>
            <div class="summary-body" id="summaryBody">
                <div class="summary-row">
                    <div class="summary-section breakdown-section">
                        <h3>Category Breakdown</h3>
                        <div id="categoryBreakdown" class="breakdown-bars"></div>
                    </div>
                    <div class="summary-section highlight-section">
                        <h3>🤖 AI/LLM Tracker</h3>
                        <div class="ai-tracker">
                            <div class="ai-stat-big" id="aiCount">0</div>
                            <div class="ai-stat-label">AI/LLM flagged updates</div>
                            <div class="ai-pct-bar">
                                <div class="ai-pct-fill" id="aiPctFill"></div>
                            </div>
                            <div class="ai-stat-sub" id="aiPctText">0% of all signals</div>
                        </div>
                    </div>
                </div>
                <div class="summary-row">
                    <div class="summary-section">
                        <h3>Top Sources</h3>
                        <div id="topSources" class="top-sources-list"></div>
                    </div>
                    <div class="summary-section">
                        <h3>Key Highlights</h3>
                        <div id="keyHighlights" class="highlights-list"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Results Count -->
        <div class="results-bar" id="resultsBar">
            <span id="resultsCount"></span>
        </div>

        <section class="alerts-grid" id="alertsGrid" aria-live="polite">
            <!-- Skeleton loaders -->
            <div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div><div class="skeleton-line w70"></div></div>
            <div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div><div class="skeleton-line w70"></div></div>
            <div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div><div class="skeleton-line w70"></div></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
